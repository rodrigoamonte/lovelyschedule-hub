services:
  gateway:
    image: nginx:stable-alpine
    container_name: agendlog-gateway
    restart: unless-stopped
    ports:
      - "${APP_PORT_HOST}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - agendlog-network
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    depends_on:
      app:
        condition: service_healthy
      api:
        condition: service_healthy

  app:
    build:
      context: ./agendlog-app
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_APP_NAME=${VITE_APP_NAME}
    container_name: agendlog-app
    restart: unless-stopped
    networks:
      - agendlog-network
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./agendlog-api
    container_name: agendlog-api
    restart: unless-stopped
    # ports: #DESCOMENTAR CASO PRECISE ACESSAR O CONTAINER DIRETAMENTE
    #   - "${API_PORT}:${API_PORT}"
    networks:
      - agendlog-network
    volumes:
      - ./agendlog-api/prisma:/app/prisma
    environment:
      - DATABASE_URL=mysql://${DB_USER}:${DB_ROOT_PASSWORD}@${DB_HOST}:3306/${DB_NAME}
      - ENVIRONMENT=${ENVIRONMENT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
      - PORT=${API_PORT}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TZ=America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    command: sh /app/entrypoint.sh
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mysql:8.0
    container_name: agendlog-db
    restart: unless-stopped
    networks:
      - agendlog-network
    volumes:
      - agendlog-db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - TZ=America/Sao_Paulo
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      timeout: 5s
      retries: 10

networks:
  agendlog-network:
    driver: bridge

volumes:
  agendlog-db-data:
